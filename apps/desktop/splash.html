<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="web-shim.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaOps - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .splash-card {
            background: #ffffff;
            width: 350px;
            height: 450px;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: splashEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        @keyframes splashEntrance {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 24px;
            position: relative;
            transform-style: preserve-3d;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            object-fit: contain;
            animation: logoFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(99, 102, 241, 0.2));
        }

        @keyframes logoFloat {

            0%,
            100% {
                transform: translateY(0px) rotateY(0deg);
            }

            50% {
                transform: translateY(-15px) rotateY(10deg);
            }
        }

        .splash-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .splash-subtitle {
            font-size: 13px;
            color: #6366f1;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        .progress-wrapper {
            width: 220px;
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            margin-top: 40px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #d946ef);
            background-size: 200% 100%;
            border-radius: 10px;
            animation: loading 1.5s infinite ease-in-out, gradientShift 2s infinite linear;
        }

        @keyframes loading {
            0% {
                left: -40%;
                width: 40%;
            }

            50% {
                left: 40%;
                width: 60%;
            }

            100% {
                left: 100%;
                width: 20%;
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        /* Particles decoration */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #6366f1;
            border-radius: 50%;
            opacity: 0.3;
            animation: particleFloat 3s infinite ease-in-out;
        }

        @keyframes particleFloat {

            0%,
            100% {
                transform: translate(0, 0);
                opacity: 0;
            }

            50% {
                transform: translate(var(--x), var(--y));
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>
    <div class="splash-card">
        <!-- Decoration Particles -->
        <div class="particle" style="--x: -40px; --y: -30px; top: 20%; left: 20%; animation-delay: 0.2s;"></div>
        <div class="particle" style="--x: 50px; --y: 40px; bottom: 30%; right: 15%; animation-delay: 0.5s;"></div>
        <div class="particle" style="--x: -30px; --y: 50px; bottom: 20%; left: 30%; animation-delay: 1.2s;"></div>

        <div class="logo-container">
            <img src="https://xnlmfbnwyqxownvhsqoz.supabase.co/storage/v1/object/public/files/cropped_circle_image.png"
                class="logo-img" alt="AlphaOps Logo">
        </div>
        <h1 class="splash-title">AlphaOps</h1>
        <p class="splash-subtitle">DevOps Reimagined</p>
        <div class="progress-wrapper">
            <div class="progress-bar"></div>
        </div>
        <p
            style="position: absolute; bottom: 24px; font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
            Loading Core Modules...</p>
    </div>

    <script>
        // Web-specific redirect
        setTimeout(() => {
            window.location.href = '/auth';
        }, 3500);
    </script>
</body>

</html>
